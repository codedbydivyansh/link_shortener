{% extends "base.html" %}

{% block title %}
Link Shortener
{% endblock %}

{% block content %}

<div class="container">

    <h1>🔗 Link Shortener</h1>

    <p>
        Convert long URLs into short, shareable links.
    </p>

<form action="/shorten" method="POST">

    <input
        type="text"
        name="url"
        placeholder="https://example.com"
        required>

    <button type="submit">
        Shorten URL
    </button>

</form>

{% if short_link %}

    <div class="result">

        <h3>Your Short Link</h3>

        <a href="{{ short_link }}" target="_blank">
            {{ short_link }}
        </a>
    </div>

    {% endif %}

<a href="/dashboard" class="dashboard-btn">
    View Dashboard
</a>

</div>

{% endblock %}
